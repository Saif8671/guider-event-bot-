openapi: 3.0.3
info:
  title: EventFlow Luma / AI Bot Contract
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /luma/events/{eventId}/registrations:
    post:
      summary: Create a registration in Luma
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guestName, guestEmail]
              properties:
                guestName:
                  type: string
                guestEmail:
                  type: string
                guestPhone:
                  type: string
      responses:
        "200":
          description: Registration created
  /luma/tickets/validate:
    post:
      summary: Validate a QR token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventId, token, deviceId]
              properties:
                eventId:
                  type: string
                token:
                  type: string
                deviceId:
                  type: string
      responses:
        "200":
          description: Validation result
  /luma/checkins:
    post:
      summary: Persist a check-in in Luma
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventId, registrationId, ticketId, deviceId, method, result]
              properties:
                eventId:
                  type: string
                registrationId:
                  type: string
                ticketId:
                  type: string
                deviceId:
                  type: string
                method:
                  type: string
                result:
                  type: string
      responses:
        "200":
          description: Check-in stored
  /bot/scans:
    post:
      summary: Scan a QR code in the AI bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventId, deviceId, token]
              properties:
                eventId:
                  type: string
                deviceId:
                  type: string
                token:
                  type: string
      responses:
        "200":
          description: Scan result
  /bot/events/{eventId}/feedback:
    post:
      summary: Submit feedback from the AI bot
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [registrationId, rating]
              properties:
                registrationId:
                  type: string
                rating:
                  type: integer
                feedbackText:
                  type: string
                wouldReturn:
                  type: boolean
      responses:
        "200":
          description: Feedback stored

